<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
    />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' https://cdnjs.cloudflare.com; img-src 'self' data:; font-src 'self' https://cdnjs.cloudflare.com; connect-src https://api.openweathermap.org; base-uri 'self'; form-action 'self'; object-src 'none'; frame-ancestors 'none'; upgrade-insecure-requests;"
    />
    <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=()" />
    <meta name="referrer" content="no-referrer-when-downgrade" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WeatherHub" />
    <meta name="theme-color" content="#667eea" />
    <meta
      name="description"
      content="WeatherHub - Get real-time weather information for any city around the world with beautiful UI and search history."
    />
    <meta name="keywords" content="weather, weather app, real-time weather, city weather" />
    <title>Weather App - Real-time Weather</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      integrity="sha512-/SlX8/pOm5+CtIV02qIfEtMk2QIclqtjZSGOBOx16eVAMGRvfzqziTL/KPB4/bav3xg8I81DPCimumbntjY7vQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="background-animation"></div>

    <div class="container">
      <div class="header">
        <h1><i class="fas fa-cloud-sun"></i> WeatherHub</h1>
        <p>Get Real-Time Weather Information</p>
      </div>

      <div class="search-section">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Enter city name..." spellcheck="false" />
          <button id="searchBtn" class="search-btn" type="button" aria-label="Search weather">
            <span class="search-btn-icon" aria-hidden="true"></span>
          </button>
        </div>
        <div class="error-message" id="errorMsg">
          <i class="fas fa-exclamation-circle"></i>
          <span id="errorText">City not found. Please try again.</span>
        </div>
      </div>

      <div class="history-section">
        <div class="history-header">
          <h3><i class="fas fa-history"></i> Search History</h3>
          <button class="clear-history-btn" id="clearHistoryBtn" type="button">
            <i class="fas fa-trash"></i> Clear
          </button>
        </div>
        <div class="history-list" id="historyList">
          <p class="no-history">No search history yet</p>
        </div>
      </div>

      <div class="weather-card" id="weatherCard">
        <div class="placeholder">
          <i class="fas fa-search"></i>
          <p>Search for a city to get started</p>
        </div>

        <div class="weather-content hidden" id="weatherContent">
          <div class="weather-main">
            <div class="icon-section">
              <i class="fas fa-cloud weather-icon" id="weatherIcon"></i>
            </div>
            <div class="temp-section">
              <div class="temp" id="temp">--&deg;C</div>
              <div class="city" id="city">--</div>
              <div class="description" id="description">--</div>
            </div>
          </div>

          <div class="details-grid">
            <div class="detail-card">
              <div class="detail-icon">
                <i class="fas fa-droplet"></i>
              </div>
              <div class="detail-info">
                <p class="detail-label">Humidity</p>
                <p class="detail-value" id="humidity">--%</p>
              </div>
            </div>

            <div class="detail-card">
              <div class="detail-icon">
                <i class="fas fa-wind"></i>
              </div>
              <div class="detail-info">
                <p class="detail-label">Wind Speed</p>
                <p class="detail-value" id="wind">-- km/h</p>
              </div>
            </div>

            <div class="detail-card">
              <div class="detail-icon">
                <i class="fas fa-gauge"></i>
              </div>
              <div class="detail-info">
                <p class="detail-label">Pressure</p>
                <p class="detail-value" id="pressure">-- mb</p>
              </div>
            </div>

            <div class="detail-card">
              <div class="detail-icon">
                <i class="fas fa-thermometer-half"></i>
              </div>
              <div class="detail-info">
                <p class="detail-label">Feels Like</p>
                <p class="detail-value" id="feelsLike">--&deg;C</p>
              </div>
            </div>

            <div class="detail-card">
              <div class="detail-icon">
                <i class="fas fa-eye"></i>
              </div>
              <div class="detail-info">
                <p class="detail-label">Visibility</p>
                <p class="detail-value" id="visibility">-- km</p>
              </div>
            </div>

            <div class="detail-card">
              <div class="detail-icon">
                <i class="fas fa-cloud-rain"></i>
              </div>
              <div class="detail-info">
                <p class="detail-label">Cloudiness</p>
                <p class="detail-value" id="clouds">--%</p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="footer">
        <p>Made with &#10084; By Rohit Shah</p>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
